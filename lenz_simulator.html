<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HammerLoom Lenz-Koenigsegg Sim Matrix</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff66;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #terminal {
            width: 100%;
            max-width: 800px;
            border: 1px solid #00ff66;
            background-color: #000;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);
        }
        .header {
            border-bottom: 1px dashed #00ff66;
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        .telemetry-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .metric {
            border: 1px solid #003311;
            padding: 10px;
            background: #020804;
        }
        .value {
            font-size: 1.2em;
            font-weight: bold;
            color: #ffffff;
        }
        #canvas-container {
            text-align: center;
            margin-top: 15px;
        }
        canvas {
            border: 1px solid #004411;
            background: #010502;
            width: 100%;
            max-width: 760px;
        }
        .bar-container {
            background-color: #111;
            border: 1px solid #00ff66;
            height: 20px;
            width: 100%;
            margin-top: 5px;
        }
        .bar {
            background-color: #00ff66;
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

<div id="terminal">
    <div class="header">
        === HAMMERLOOM V1.1 // LENZ HYPERCAR SIMULATOR MATRIX ===<br>
        TARGET DESCENT: 5-MINUTE NÜRBURGRING RUN (ACTIVE SECTOR TRACKING)
    </div>

    <div class="telemetry-grid">
        <div class="metric">Sector: <span id="lbl-sector" class="value">INITIALIZING</span></div>
        <div class="metric">Velocity: <span id="lbl-speed" class="value">000</span> MPH</div>
        <div class="metric">Lenz Passive Force: <span id="lbl-lenz" class="value">0.00</span> T</div>
        <div class="metric">Track Entropy: <span id="lbl-entropy" class="value">0.00000</span></div>
        <div class="metric">Global Coherence: <span id="lbl-coherence" class="value">98.5%</span></div>
        <div class="metric">Time Elapsed: <span id="lbl-time" class="value">0:00.00</span></div>
    </div>

    <div>
        <div>Simulated Progress Baseline:</div>
        <div class="bar-container"><div id="progress-bar" class="bar"></div></div>
    </div>

    <div id="canvas-container">
        <canvas id="simCanvas" width="760" height="200"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    let totalDuration = 341.12; // Complete 5m 41s optimized target run
    let startTime = Date.now();
    let sectors = [
        { name: "Flugplatz (Launch/Crest)", startPct: 0, endPct: 15, baseSpeed: 190, waveAmp: 20 },
        { name: "Fuchsrohre (Compression Dip)", startPct: 15, endPct: 40, baseSpeed: 245, waveAmp: 40 },
        { name: "Karussell (Banked Tile G-Wall)", startPct: 40, endPct: 70, baseSpeed: 110, waveAmp: 15 },
        { name: "Döttinger Höhe (Infinite Straight)", startPct: 70, endPct: 100, baseSpeed: 335, waveAmp: 10 }
    ];

    function updateSimulation() {
        let elapsedRealSec = (Date.now() - startTime) / 1000;
        // Time compression to experience the loop dynamically in the web frame
        let currentSimSec = (elapsedRealSec * 15) % totalDuration; 
        let pct = (currentSimSec / totalDuration) * 100;

        // Find Active Sector
        let activeSector = sectors[sectors.length - 1];
        for (let s of sectors) {
            if (pct >= s.startPct && pct < s.endPct) {
                activeSector = s;
                break;
            }
        }

        // Generate Non-Linear Dynamics based on our system rules
        let cycleSeed = currentSimSec * 4;
        let speedFluctuation = Math.sin(cycleSeed) * activeSector.waveAmp;
        let currentSpeed = Math.floor(activeSector.baseSpeed + speedFluctuation);
        
        // Lenz Law reactive load increases with speed & compression frequency
        let lenzForce = Math.abs(Math.cos(cycleSeed) * (currentSpeed / 100)).toFixed(2);
        
        // Entropy flushes cleanly every time the Wankel/Zamboni cycle ticks
        let rawEntropy = (Math.abs(Math.sin(cycleSeed)) * 0.04);
        let trackEntropy = (currentSimSec % 3 === 0) ? "0.00000" : rawEntropy.toFixed(5);

        // Format Timer Display
        let mins = Math.floor(currentSimSec / 60);
        let secs = (currentSimSec % 60).toFixed(2);
        let formattedTime = mins + ":" + (secs < 10 ? "0" : "") + secs;

        // Update UI Elements
        document.getElementById('lbl-sector').innerText = activeSector.name;
        document.getElementById('lbl-speed').innerText = currentSpeed;
        document.getElementById('lbl-lenz').innerText = lenzForce;
        document.getElementById('lbl-entropy').innerText = trackEntropy;
        document.getElementById('progress-bar').style.width = pct + "%";
        document.getElementById('lbl-time').innerText = formattedTime;

        // Render Matrix Waveform Canvas Display
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#00ff66';
        ctx.lineWidth = 1;

        // Draw Matrix Grid Lines
        ctx.strokeStyle = '#00220a';
        for (let x = 0; x < canvas.width; x += 40) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }

        // Draw Live Cymatic Ground-Effect Waveform
        ctx.strokeStyle = '#00ff66';
        ctx.beginPath();
        for (let i = 0; i < canvas.width; i++) {
            let waveY = 100 + Math.sin(i * 0.05 + currentSimSec) * (parseFloat(lenzForce) * 8);
            if (i === 0) ctx.moveTo(i, waveY); else ctx.lineTo(i, waveY);
        }
        ctx.stroke();

        // Draw Floating Chassis Height Line (Lenz Air Gap Alignment)
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(100, 85);
        ctx.lineTo(250, 85);
        ctx.stroke();
        ctx.fillStyle = '#ffffff';
        ctx.fillText("CHASSIS RELEAUX AXIS (GAP SECURE)", 100, 75);

        requestAnimationFrame(updateSimulation);
    }

    updateSimulation();
</script>
</body>
</html>
